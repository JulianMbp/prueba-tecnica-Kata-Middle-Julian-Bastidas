services:
  api-gateway:
    build: ./apps/api-gateway
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # En red Docker, localhost no es otro contenedor: usar nombres de servicio
      RELEASE_SERVICE_URL: http://release-service:3001
      INTEGRATION_SERVICE_URL: http://integration-service:3003
    networks:
      - release-network
    depends_on:
      - release-service
      - rules-service
      - integration-service
      - notification-service

  release-service:
    build: ./apps/release-service
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      RULES_SERVICE_URL: http://rules-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      DB_PATH: /app/data/releases.db
    volumes:
      - ./data:/app/data
    networks:
      - release-network

  rules-service:
    build: ./apps/rules-service
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      INTEGRATION_SERVICE_URL: http://integration-service:3003
    depends_on:
      - integration-service
    networks:
      - release-network

  integration-service:
    build: ./apps/integration-service
    ports:
      - "3003:3003"
    env_file: .env
    networks:
      - release-network

  notification-service:
    build: ./apps/notification-service
    ports:
      - "3004:3004"
    env_file: .env
    networks:
      - release-network

  frontend:
    build: ./apps/frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - release-network

networks:
  release-network:
    driver: bridge
